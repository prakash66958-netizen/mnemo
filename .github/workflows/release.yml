name: Build & Release APK

# Triggers on every push to main that bumps the version in pubspec.yaml,
# OR when you manually push a tag like v2.2.0.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build APK and create GitHub Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so we can read the full tag history

      # ── 2. Set up Java (required by Gradle) ──────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Set up Flutter ────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      # ── 4. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 5. Build release APK ─────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      # ── 6. Extract version from tag ──────────────────────────────────────
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── 7. Rename APK to include version ─────────────────────────────────
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/Mnemo-${{ github.ref_name }}.apk

      # ── 8. Generate changelog from git log since last tag ────────────────
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" | head -30)
          else
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s")
          fi
          # Write to file to avoid quoting issues
          echo "## What's new in ${{ github.ref_name }}" > changelog.md
          echo "" >> changelog.md
          echo "$LOG" >> changelog.md
          echo "CHANGELOG_FILE=changelog.md" >> $GITHUB_OUTPUT

      # ── 9. Create GitHub Release with APK ────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Mnemo ${{ github.ref_name }}
          body_path: changelog.md
          files: build/app/outputs/flutter-apk/Mnemo-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
