name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build APK and create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Java 17 ────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Set up Flutter (latest stable) ────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Write local.properties with CI paths ───────────────────────────
      # local.properties is gitignored (contains local machine paths).
      # We generate it here so Gradle can find the Flutter SDK and Android SDK.
      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$(which flutter | xargs dirname | xargs dirname)" >> android/local.properties

      # ── 5. Decode release keystore from secret ────────────────────────────
      - name: Decode keystore
        run: |
          # Strip any whitespace/newlines that may have been introduced when
          # the secret was pasted into GitHub.
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > android/app/release.jks
          # Verify the keystore is a valid file (>1KB).
          ls -la android/app/release.jks

      # ── 6. Write key.properties for Gradle signing ────────────────────────
      - name: Write key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=release.jks" >> android/key.properties

      # ── 7. Flutter doctor ────────────────────────────────────────────────
      - name: Flutter doctor
        run: flutter doctor -v

      # ── 8. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 9. Build release APK ─────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      # ── 10. Rename APK to include version ────────────────────────────────
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/Mnemo-${{ github.ref_name }}.apk

      # ── 9. Generate changelog from git log since last tag ────────────────
      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" | head -30)
          else
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s")
          fi
          echo "## What's new in ${{ github.ref_name }}" > changelog.md
          echo "" >> changelog.md
          echo "$LOG" >> changelog.md

      # ── 10. Create GitHub Release with APK ───────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Mnemo ${{ github.ref_name }}
          body_path: changelog.md
          files: build/app/outputs/flutter-apk/Mnemo-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
