name: mnemo
description: "Mnemo - Your private second brain. An offline-first universal memory inbox."
publish_to: 'none'
version: 2.9.4+22

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Filesystem / paths
  path_provider: ^2.1.5
  path: ^1.9.1

  # Notifications (offline reminders)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1

  # Routing
  go_router: ^14.6.2

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1

  # Media & sharing
  receive_sharing_intent: ^1.8.1
  share_plus: ^10.1.0
  url_launcher: ^6.3.1

  # Preferences for lightweight settings
  shared_preferences: ^2.3.3

  # File picking for backup import
  file_picker: ^8.1.4

  # App version from pubspec at runtime
  package_info_plus: ^8.3.0

  # Google Sign-In (credential provider for Firebase Auth)
  google_sign_in: ^6.2.2
  http: ^1.2.2

  # Geolocation (exact pin for location picker)
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Firebase (cloud backup & sync)
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

  # Property-based testing for the UX-improvements-batch spec.
  glados: ^1.1.5

# isar_generator pins analyzer < 6.0.0, but newer versions of `test` (a
# transitive dep of glados) require analyzer >= 8.0.0. The override lets
# both packages resolve. isar_generator only uses analyzer for its own
# code generation step, which we still exercise via build_runner.
dependency_overrides:
  analyzer: ^8.0.0

flutter:
  uses-material-design: true
