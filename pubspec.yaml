name: mnemo
description: "Mnemo - Your private second brain. An offline-first universal memory inbox."
publish_to: 'none'
version: 2.3.0+5

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Filesystem / paths
  path_provider: ^2.1.5
  path: ^1.9.1

  # Notifications (offline reminders)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1

  # OCR (on-device, offline)
  google_mlkit_text_recognition: ^0.15.0

  # Routing
  go_router: ^14.6.2

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1

  # Media & sharing
  image_picker: ^1.1.2
  receive_sharing_intent: ^1.8.1
  share_plus: ^10.1.0
  url_launcher: ^6.3.1

  # Preferences for lightweight settings
  shared_preferences: ^2.3.3

  # File picking for backup import
  file_picker: ^8.1.4

  # App version from pubspec at runtime
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
